<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Canvas</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #001220; 
            user-select: none; 
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, #005a96 0%, #00294d 50%, #001220 100%);
            position: relative;
        }

        #world {
            position: absolute;
            width: 20000px; 
            height: 20000px;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 50px 50px;
            transform-origin: 0 0;
            cursor: grab;
        }

        #world:active {
            cursor: grabbing;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.3);
            animation: float infinite ease-in;
            pointer-events: none; 
        }
/* --- ECOSYSTEM FOOD --- */
        .seaweed {
            position: absolute;
            width: 15px;
            height: 60px;
            background: #2e8b57; /* Sea Green */
            border-radius: 50% 50% 0 0;
            transform-origin: bottom center;
            animation: sway 3s infinite alternate ease-in-out;
            pointer-events: none;
        }

        .bittergrass {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #9acd32; /* Yellow-Green */
            border-radius: 50%;
            border: 3px dashed #6b8e23; /* Gives a textured, fuzzy grass edge */
            pointer-events: none;
        }

        .urchin {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #4b0082; /* Deep Purple */
            /* This complex polygon creates a 12-point spiky star! */
            clip-path: polygon(50% 0%, 58% 25%, 85% 15%, 70% 38%, 100% 50%, 70% 62%, 85% 85%, 58% 75%, 50% 100%, 42% 75%, 15% 85%, 30% 62%, 0% 50%, 30% 38%, 15% 15%, 42% 25%);
            pointer-events: none;
        }
/* --- ENTITIES --- */
        .prey {
            position: absolute;
            width: 24px;   /* Longer body */
            height: 12px;  /* Sleek profile */
            background: #00ffff; 
            /* This polygon maps out a perfect fish pointing right! */
            clip-path: polygon(100% 50%, 70% 20%, 30% 20%, 0% 0%, 0% 100%, 30% 80%, 70% 80%);
            transform-origin: center;
            /* Use drop-shadow instead of box-shadow for clip-paths */
            filter: drop-shadow(0 0 5px rgba(0, 255, 255, 0.8)); 
        }
        @keyframes sway {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(15deg); }
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            opacity: 0.5;
        }

        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; } 
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; } 

        #hud {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-family: monospace;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="world"></div>
    </div>

    <div id="crosshair"></div>
    <div id="hud">POS: X:0 Y:0 Z:1.00</div>

  <script type="module" src="./systems/engine.js"></script>
</body>
</html>
