<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Canvas</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #001220; 
            user-select: none; 
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, #005a96 0%, #00294d 50%, #001220 100%);
            position: relative;
        }

        #world {
            position: absolute;
            width: 20000px; 
            height: 20000px;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 50px 50px;
            transform-origin: 0 0;
            cursor: grab;
        }

        #world:active {
            cursor: grabbing;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.3);
            animation: float infinite ease-in;
            pointer-events: none; 
        }
/* Underwater Rock Formations */
        .rock {
            position: absolute;
            background-color: #1c2b3b; /* Deep grey-blue */
            border: 4px solid #111a24; /* Darker edge */
            border-radius: 40px; /* Smooth, eroded corners */
            box-shadow: inset 10px 10px 20px rgba(255, 255, 255, 0.05), 
                        15px 15px 30px rgba(0, 0, 0, 0.4);
            pointer-events: none; /* Lets you click/drag through them */
        }
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-800px) scale(1.5); opacity: 0; }
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            opacity: 0.5;
        }

        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; } 
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; } 

        #hud {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-family: monospace;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="world"></div>
    </div>

    <div id="crosshair"></div>
    <div id="hud">POS: X:0 Y:0 Z:1.00</div>

  <script type="module" src="./systems/engine.js"></script>
</body>
</html>
